body:
  text: 菩薩沙彌古吳智旭新疏菩薩比丘溫陵道昉叅訂此經以法供為名自性三寶為體孝慈為宗拔苦與樂為用大乘為教相原夫人世福田莫尚乎三寶出世道法莫先乎孝慈欲報深恩莫要乎與拔欲成濟度莫大乎盂蘭是以目連道滿首思乳哺之恩大聖垂慈廣示法供之式時必擇夫自恣德乃藉於眾僧僧寶所存法輪斯在法輪轉處佛常現前舉一即三最勝無比圓音一唱慈親已脫於苦輪錫類重咨芳軌永貽於緇素誰無父母如何弗思況復垂訓殷勤教令念念常憶自非觀心起行焉能事理雙彰一字法門非海墨之所罄四輩齊奉豈淺近之津梁略述五重用探奧旨就五重中又各二番明義一就事二觀心初就事釋名者即是盂蘭盆法供之名也盂蘭乃是梵語正云烏藍婆拏此翻救倒懸謂三塗劇苦無可喻陳借喻倒懸此法一興倒懸斯解名之為救盆字是華言乃貯食之淨器一切碗鉢通名為盆後人不達作一大盤眾食盡著於中普同供養此則大違律制眾僧不饗以凡聖雖殊俱不觸僧伽食器故今言盂蘭盆者謂以種種淨潔碗鉢貯種種淨潔美食供十方僧能救慈親猶如倒懸之苦倒懸是所救盆是能救能所合稱名盂蘭盆又以所從能即名此盆為救倒懸盆也夫分段變易皆名苦報何但餓鬼方稱倒懸凡夫四倒二乘四倒皆倒因也欲界無禪定之食三有乏無漏之漿偏真缺俗諦法財權位失中道實味皆倒果也碗鉢為盆百味五果為食解餓鬼倒懸攝心為盆十支為食解欲界倒懸念處為盆四諦行觀為食解三界倒懸宏願為盆六度萬行為食解四枯倒懸一心為盆不思議觀為食解二邊倒懸引伸觸類總以碗鉢百味為正因緣境若無事境理觀無寄若無理觀事功不深倘見此說便欲廢事則目連始得六通亦既成就念處盆四諦食何故母猶不脫鬼倫耶佛說二字具如常解經是通名亦如常釋此不繁述次觀心釋名者淨戒為器無作四諦不思議觀慧為食供養自性一體三寶圓解八倒之懸頓履一實之地無明父貪愛母當下即成明脫智度母方便父任運入無功用故名盂蘭盆也二就事辨體者一切諸經必有正體若無正體則邪倒無印便成魔說通論諸大乘經皆以實相為印為經正體然實相雖一具種種名如天帝釋一人多名普應諸天實相亦爾一法多名普應諸經經既名別即以別名而召通體於理無咎今經中云當須十方眾僧威神之力又云初受食時先安佛前僧呪願竟便自受食呪願即是法三寶具足目連亦云得蒙三寶功德之力而此三寶即是一切眾生自性若眾生自性本不具足三寶功德者則凡聖條隔明暗永歧凡不成感聖不能應以心佛眾生三無差別迷悟雖異體性常一所以諸佛心內眾生依事托理感於眾生心內諸佛則眾生心內諸佛無緣無念任運應於諸佛心內眾生故以自性三寶為經體也釋此自性三寶復為四義一住持三寶二勝義三寶三大乘別相三寶四一體三寶住持三寶者佛在世時樹王得道為佛寶說四諦法為法寶度五比丘為僧寶佛滅度後範金合土紙素丹青為佛寶黃卷赤牘三藏聖教為法寶剃髮染衣紹隆佛化為僧寶此三住世不絕故名住持三寶當知一切形像即是真身經典所在是法身舍利凡夫比丘僧亦能荷負正法為世福田可尊可尚悉稱為寶非世間珍寶所能喻也勝義三寶者一切智無學功德五分所成名為佛寶丈六金身止是載此道法之器今時形像又是表此載道之器者耳斷欲無欲滅諦涅槃非三世所攝其性常住名為法寶四諦法音止是詮此真理黃卷赤牘又所以傳此法音亦即詮此真理令人因言見道如魚兔之藉筌蹄明月之賴標指耳聲聞學無學功德名為僧寶事和六法止是趨向此道者耳大乘別相三寶者坐蓮華臺始覺道滿等真法性常住不滅剎塵相好自在莊嚴化身無數徧度含識是為佛寶十二部經真淨法藏一一修多羅不可說不可說修多羅而為眷屬一字法門海墨書而不盡是為法寶三賢十聖自在神通徧滿十方上求下化功德智慧二種莊嚴覩影聞名皆獲勝利是為僧寶一體三寶者以實相慧覺了諸法非空非有亦空亦有雙忘雙照三智圓覺名為佛寶所覺法性之理三諦具足名法寶如此覺慧與理事和合名僧寶此三即非條別當知亦即是三道三識三因三智三菩提三大乘三身三涅槃三德等非一非三而三而一在凡不減在聖不增本自有之非適今也雖復本具在迷不覺但有其理是為理即佛亦名理即法亦名理即僧若從善知識聞若從經卷聞聞已開解恍如夢覺無復疑惑是為名字三寶如理觀心圓伏五住名觀行三寶相似解發六根清淨見思先落塵沙亦盡名相似三寶無明分破契會真常名分真三寶圓滿菩提覺法自性身土一如理事平等名究竟三寶如此四義深淺雖殊原始要終總歸自性後一雖了知自性未嘗廢於前三前三雖未達自性何嘗離性別有施設故總名自性三寶也此自性三寶一經之正體眾法之都會種種萬行共歸趣之無量功德共莊嚴之言說辯論而詮顯之如父如君如月如海如天帝釋最尊最貴故名為體又此三寶即是一切法之源底若能深知此三寶義於一切法即為窮盡源底更無餘蘊故名為體又體此三寶即能徧達一切法門更無少法出三寶外無有少法之中而不全具三寶體性故名為體眾生迷此三寶體性故非背而背起惑造業出生十界苦集顛倒或著有漏或著無漏或著二邊或著中道總名慳貪如彼餓鬼聖人悟此三寶體性故非順而順修因尅果出生半滿頓漸一切道滅破惡業障破見思障破塵沙障破無明障總名法供如彼目連故以自性三寶為經體也次觀心辨體者只此眾生現前一念知覺之性非內非外不在中間非過非現亦非未來非青黃赤白非長短方圓豎無初後橫絕邊涯欲言其有則毫無朕迹欲言其無則不可斷滅本自離諸戲論但因覿體自迷雖久積沉迷然終無減缺是名佛寶現前一切十界依正諸法皆此介爾心中之所顯現如彼夢中所見諸法終不離於夢心現前諸法亦復如是雖妄謂在我心外各各實有而實非有猶如夢未醒時執夢為實醒後尋覔了不可得如此心中所現十界不離自心名為法寶心外無法法外無心一任顛倒昏迷分能分所究竟離心覔法無分毫法相可得離法覔心亦無少許心相可得即心是法即法是心本自和合不可乖異名為僧寶此介爾一念心中圓具如此三寶體性無欠無餘猶如金剛不可壞滅一念既爾一切諸念亦復如是一切諸佛依此得道轉大法輪入大涅槃一切住持三寶勝義三寶別相三寶一體三寶繇此建立故曰一切眾生即涅槃相不復更滅又曰諸佛解脫當於眾生心行中求若能觀此介爾之心則能具足一切佛法故曰諸佛正徧知海從心想生若不作此觀心辨體者云何名為於念念中常憶父母而修孝慈耶三就事明宗者戒雖無量以孝為宗萬行雖多以孝為首所以釋迦曠劫常修報恩之行目連成道即念乳哺之恩當知非但成道之後方念其親實因報親因緣方修聖道如地藏菩薩昔為婆羅門女為度母故發大悲心生界未空誓不先成佛道諸佛菩薩發心因緣大率如此申此孝義即有二種一世間孝二出世孝世間孝有三種一能尊親謂自成聖賢亦能喻親於道如大舜等又繼志述事如武周等二不辱其親如曾子啟手啟足等三能養其親如必有酒肉等能尊親者名為大孝亦名達孝亦名至孝即是世間孝之極致然雖宗廟饗之子孫保之不能使其親出輪廻苦證常住樂聖人設教曲隨物情楊葉止啼為出世孝作弄引耳出世孝復有二義一直明孝道二以慈成孝直明孝道者即有四種一盡心供養二誘令修善三勸令捨惡四令證道果盡心供養者如五分律云若人百年之中右肩擔父左肩擔母極世珍奇衣食供養猶不能報須臾之恩從今聽諸比丘盡心盡壽供養父母若不供養得重罪也誘令修善者如佛說孝子經云若不能以三尊之至化其親者雖盡孝養猶為不孝能令二親去惡為善奉持五戒執三自歸朝奉而暮終者是報重恩毗尼母經云父母若貧先與受歸戒已然後施與又自修善行亦名為孝如罵意經云人持戒乃孝順報父母恩耳何以故不殺萬物得長生不盜物皆富不婬不亂不欺皆信不飲酒皆淨父母有時墮是中便安隱也勸令捨惡者如孝子經云若親頑闇不奉三尊兇虐殘戾等子當極諫以啟悟之若猶未悟即為開化牽臂引類示王者之牢獄諸囚之刑戮若復未移悲泣啼號絕不飲食親雖不明必懼子死當強忍伏心崇正道儒禮亦云父母有過三諫而不聽則號泣而隨之也令證道果者如淨藏淨眼之於妙莊嚴王釋迦世尊之於淨飯父王乃摩耶夫人等此四種孝即順四悉檀意初之一種同於世間第三能養令父母得歡喜益但世間孝養多事殺生重結怨業出世孝養清淨無過是為異也修善捨惡同於世間第一大孝令父母得生善滅惡二益若自修善行亦名為孝即同世間第二不辱其親但儒明不辱止據現生佛戒功能濟度累劫是為異也令證道果世間所無能令父母得入理益前三為權此一為實就入理中更約生滅無生無量無作科簡權實義多無盡今經約迹一往屬權約教約理定須歸實未有如斯哀請救出苦輪而猶終滯人天偽果者也次明以慈成孝者復為三一生緣慈二法緣慈三無緣慈生緣慈者觀一切眾生如父母想故梵網云一切男子是我父一切女人是我母我生生無不從之受生作此觀時怨親平等於七種境中次第與三品樂以此調伏瞋惱慳嫉乃至證得慈心三昧凡與我有緣者皆能為其拔苦與樂父母恩最重故與拔最在先也法緣慈者觀一切法皆從緣生故梵網云一切地水是我先身一切火風是我本體眾生惟是四大合成無我無人無壽無命既四大無二故慈心所緣亦無有二作此觀時怨親一相乃至證得慈心三昧與拔之力較前更勝也無緣慈者了知心佛眾生三無差別法界一相真實平等不住法相及眾生相觀菩提即煩惱涅槃即生死起無作誓欲拔性德之苦觀煩惱即菩提生死即涅槃起無作誓欲與性德之樂此慈即悲此悲即慈稱性圓修熏成三昧隨法界眾生有可化機宜關於同體法性者無謀無慮任運應之如此大慈不可思議普門示現神力無邊塵剎含靈無不徧度生我重德甯不超昇也此三種慈生緣乃三乘之所共修但二乘本無利他宏誓故為力微菩薩修之力用廣大次法緣慈二乘亦能少分修習正是菩薩所修三無緣慈則中道佛法不共二乘今就目連釋者須約本迹本則諸大聲聞皆法身示現久修久證無緣大慈迹則示同小果僅成生緣慈力故佛簡云非汝一人力所奈何眾聖之道具三種慈故云當須十方眾僧之力也何故約三慈成孝以經中云常以孝慈憶所生父母當知不修慈力莫成孝道儒者亦云無故而傷一昆蟲非孝也無故而損一草木非孝也況佛道乎又慈即是順順法性故順即是孝孝即是一切佛法宗要欲孝父母須順三寶欲孝順三寶須修孝慈報父母恩又三寶即是父母如罵意經云佛為父法為母等又父母亦即是三寶如云有二活佛在汝家中謂父與母故梵網云孝順父母師僧三寶孝順至道之法今經以孝慈為宗也次觀心明宗者現前一念三寶具足隨順觀察名之為孝一名法供迷惑流浪名之為逆亦名罪根一念與觀慧相應則十界俱悟何況父母一念與法性相背則十界俱迷又何止父母又悟則智度母方便父同得解脫迷則無明父貪愛母同歸苦輪如此觀心是念念中常修孝慈也四就事明用者拔苦與樂以為力用拔餓鬼苦與生天樂此則就近略明耳實則拔生死苦與涅槃樂拔滯寂苦與遊戲神通樂拔二邊苦與中道樂生方便土名為淨天生果報土名為義天生寂光土名天中天大涅槃天如此與拔方是今經之大力用也次觀心明用者但觀現前一念具足三寶體性則能圓拔自性十界苦集圓與自性十界道滅也五就事判教相者此是大乘方等教攝二藏名義菩薩藏收舊云屬人天乘在小乘藏但泥得脫餓鬼入天華光之文耳小乘藏中安得明十地大人權現比丘等事耶或曰目連始得六通正在十二年內時本阿含教奚方等答曰汝但知別五時不知有通五時也須約義理定其部味方無過耳次觀心教相者心具諸乘心即是教心名大乘無不運載一念觀成轉教餘念諸心心所是名觀心教相也若不就事解釋不知如來教道所關若不觀心解釋不能一切時中常修法供經云應念念中常憶父母等是教令觀心又云年年七月十五日為作盂蘭盆是教修事供又云一切佛弟子當奉持是法是雙勸受持良以眾生無始至今既各有迷事迷理二種無明各具惡業煩惱二種重障故須事理並修方能究竟拔苦與樂願佛弟子思之修之入文為三初序分二正宗分三流通分初序分二初通序二別序今初聞如是一時佛在舍衛國祗樹給孤獨園通序亦名證信序一切經首同安此語故名通序以此六種成就證是佛說令物生信故名證信序聞如是或云如是我聞西域多用倒文譯人各隨其便實無異義也聞者阿難親從佛聞順世流布稱假名我順無我法則但稱聞義亦無在也不異名如無非曰是機感相叩法席周圓曰一時一切智人覺行圓滿曰佛以四種住應迹人間示同起居曰在四種住者天住梵住聖住佛住天住者施戒善心六天之因梵住者慈悲喜捨色無色界之因聖住者三解脫門三乘聖果之因佛住者首楞嚴定力無畏不共等佛自受用之法天住梵住以應凡夫聖住應漸機佛住應頓機佛為能住人四為所住法又四為能住法國城園林為所住處也舍衛者西域大國之名此翻聞物亦翻豐德祗樹給孤獨園者本是祗陀太子之園須達多長者側布金錢買之餘有少地未布太子即發心以此奉施故雙標二人名也須達多好行惠施拯濟孤獨時人號之為給孤獨以事詣王舍城初聞佛名身毛為豎思惟不寐昏夜大明發心往見巨關自闢聞法證果請佛化度舍衛國人故布金買園造僧伽藍也是中聞字即聞成就如是即信成就一時即時成就佛即主成就舍衛祗園即處成就不列眾成就者但知文略准後文云四輩弟子歡喜奉行當知必有同聞眾也又聞約四義乃至處論四土又觀心明聞等茲不具出可以意得二別序亦名發起序經經各自不同故名別序以此因緣啟發聖教故名發起文分為六初目連道滿大目犍連始得六通尊者名尼拘律陀乃西域樹名父母禱此樹而得生因以為名大者梵語摩訶此翻大多勝天王大人所敬故言大徧解內外經書故言多超出九十五種外道故言勝今略稱大攝於多勝也目犍連此翻采菽氏尊者之姓此姓尊貴故人多以姓稱之十大弟子中神通第一言六通者一天眼二天耳三他心四宿命五神足六漏盡天眼徹見障內外色天耳具聞人非人聲他心了知眾心差別宿命憶識往昔劫事神足示現種種變化漏盡實知苦集滅道六皆稱神通者神名天心通名慧性天然之慧照徹無礙也言始得者六通之性雖皆本具迷不現前須假修顯今尊者與舍利弗初聞因緣深義頓破見惑證須陀洹尋來見佛善來得戒即如先所見重復觀察便於有漏心得解脫無漏解脫智生先所未得而今得之故名始得即是依於性共緣三種四念處力發起慧俱無疑三種解脫果證故六通力超過其餘一切聲聞也六通之性皆本具者如昔有人專精讀書不覺日暮直至黃昏朗然閱誦他人從戶外入語云天已昏黑如何暗中猶讀誦耶彼聞此語分別心生即昏無所見當知天眼之性人皆本具妄想分別致令不現前耳又如有人患聰聞牀下蟻行謂是車馬戰鬬即天耳性具迷失慧性反以為病父母於幼子雖未能言體知其意即他心性具昨日已去今猶憶知以近例遠定可還憶即宿命性具李廣射石而沒羽葛女投冶而作金舉鐵鉢而非重生心即復不勝忘香盒於殿中再往始知固扃即神足性具嘔髑髏之清泉不堪再飲聞索債之鬼語豈更思兒即無漏性具但繇積迷不返埋沒性靈致使見不超色聞不越聲亦以不達性德紆曲修持致使神通成多差別天龍神鬼報得五通境狹用短凡夫外道修得五通亦無勝用既未漏盡禪退通亡慧解脫人但盡諸漏五用不彰俱解脫人六通乃具乃至方便道中猶存作意無記化化始屬真因然雖邪正攸分小大區別總承性德威神之力若非性具修豈得成昧性而修為邪為小如盲人不見日輪亦蒙其照達修在性為正為大如人有目日光明照見種種色今目犍連所得六通迹同權小本實難思有經說言目連入八千三昧能知八千世界中事乃至震動八千世界舍利弗入一萬三昧迦葉能入一萬二千三昧除二人外餘大聲聞皆不及目連十地菩薩則展轉倍勝不可思議無非性具之德故稱性修之妙用斯大耳二知恩欲酬欲度父母報乳哺之恩父生母鞠恩重無量取要而言且云乳哺不念報恩便非人類不令度脫非真報恩然始雖念念知恩欲報無力今已得道必須先度其親三攀慕徧尋即以道眼觀視世間聖果初成即觀父母所生之處酬本願而急先務也天眼從證道得故名道眼世間者三界為器世間六道四生為眾生世間也四得見所在見其亡母生餓鬼中不見飲食皮骨連立觀視世間非但尋母而父已受樂故不須述母生餓鬼苦切倒懸救濟良法因斯發起餓鬼是異熟果酬於引業不見飲食等是等流果酬於滿業以鬼趣雖同受報有別或無財或少財或有財三種各三種成九種今目連母積慳貪之重業招無財之劇報皮骨連立自取其殃孝子慈親豈能相代果報之徵猶如影響惟心所造事不由他五悲哀往救目連悲哀即以鉢盛飯往餉其母悲哀者所謂感傷徹於骨髓號呌動於天地也母既不見飲食故先以鉢飯往餉救饑渴之極苦六惡習難轉母得鉢飯便以左手障鉢右手揣食食未入口化成火炭遂不得食本以慳貪墮茲劇苦習性難革終不迴心障鉢恐餘鬼之侵奪揣食圖一身之飽足誰知萬法惟心業力甚大美食頓成火炭倘其時能發慈悲平等之心念同類苦不忍獨䬸必當甘露充溢自他俱脫苦輪奈何惡因不除惡報斯劇雖神通大孝亦無如之何矣二正宗分三初目連悲泣陳情二如來廣示法要三當機獲益脫苦今初目連大呌悲號涕泣馳還白佛具陳如此目連稱為神通第一可以化刀杖為天華翻大地而取地肥震動世界迴轉日月皆不為難今盡其神力孝思竟無救於母難所以大呌悲哀急馳白佛此則已無彈斥而作弄引故知是大乘教門二如來廣示法要二初簡示二正示初簡示又五初彰母罪深佛言汝母罪根深結身口所起惡業名罪意地造業之本名根長時積集名深習性堅固未易改革名結如左手障鉢右手揣食即其徵也二明子力弱非汝一人力所奈何聲聞之人但得心自在未得法自在故其神力不能挽母定業此正密寓彈斥之意也三斥邪無用汝雖孝順聲動天地天神地祗邪魔外道道士四天王神亦不能奈何未入正位總名為邪雖併合三界中一切神通之力猶不及目連一人之力今先簡目連次簡天神等者一往約多少簡之正欲顯眾僧之力大也四顯正有能當須十方眾僧威神之力乃得解脫十方則不同目連之惟一人眾僧則不同天神等之非聖侶所以威神不可思議能令深結之罪根從此可解脫也僧者梵語具云僧伽此翻和合眾和合有二義一者理合謂同證擇滅無為二者事和謂戒和同修見和同解利和同均身和同住口和無諍意和同悅四人乃至無數名之為僧今言眾僧即是華梵合舉亦是以眾表數以僧表德也具理事二和名真實僧但具事和名清淨僧真實僧寶能令勝義正法久住不滅清淨僧寶能令世俗世法久住不滅故律藏云下至有五人持律者和合同住在世間是名正法不滅當知佛滅度後佛法命脉全寄於僧供僧即為普供三寶所以威神特尊也又略由四義當須眾僧一者佛法聖眾舉世樂聞故二者依戒修持堪為福田生物善故三者正治餓鬼慳業普供十方轉惡習故四者佛法由僧建立最可顯於一體三寶又十方同聚凡聖交參最可顯於同體法性故五許以救方吾今當說救濟之法令一切難皆離憂苦已知僧有威神未審如何感格故須說上合之法以成悲仰則感應道交方獲濟度一切者約人則徧利塵沙不獨目連之母約法則永拔二死不但餓鬼之殃憂苦者意受名憂身受名苦懼於後果名憂嬰於現報名苦濟拔無術名憂痛若切膚名苦法門一唱當使皆得遠離二正示二初教孝子獻供之法二教眾僧受供之儀初教孝子獻供之法又五一定勝時佛告目連十方眾僧七月十五日僧自恣時七月十五者前三月夏安居從四月十六受今九旬期滿將事遊行故眾僧和合同受自恣言自恣者梵語鉢剌婆剌拏譯為隨意即是隨他於三事之中任意舉發說罪除愆之義舊云自恣乃義翻耳其辭曰大德眾僧今日自恣我某甲比丘亦自恣若見聞疑罪大德長老哀愍故語我我若見罪當如法懺悔各各次第如此三說受自恣已名為安居事訖從此各任東西今此日中乃大眾和合互相勉勵遵崇道業改過遷善之日故名勝時二發勝意當為七世父母及現在父母厄難中者所為之人不止一生厄難之苦通於存歿發心等濟故名勝意然七世之言且就凡夫心量羸劣略言之耳若深信勝田廣修勝供發於增上最勝之心當知塵點劫前生身父母六親眷屬皆可同出苦輪方名一切難皆離憂苦也三設勝供具飯百味五果汲灌盆器香油錠燭牀敷臥具盡世甘美以著盆中供養十方大德眾僧具飯二字總標設供也百味極言其味之多謂飯餅酥酪醍醐等五果謂根莖葉華果汲灌盆器謂澡手洗足沐浴之具皆須清淨香可焚熏油可塗足錠即燈也有足曰錠無足曰鐙鐙與燈同故然燈佛或翻為錠光佛以義同故盡世甘美以著盆中者重申奉盆設供之意甘美止是百味五果言盡世者富則羅天下之珍奇貧乃竭一人之力量惟誠惟懇無惜無慳盆者即種種如法清淨碗鉢或百或千乃至無數羅列供養總名為盆是所謂盂蘭盆也於四事中略不言醫藥於五塵中略不言音樂及散名華准寄歸傳亦應有之供養十方大德眾僧者教以運想之方法界無遮微塵不隔清淨海眾咸集此中現前供具徧同塵剎無礙莊嚴重重無盡具如香華觀想偈文應細知之四讚勝田當此之日一切聖眾或在山間禪定或得四道果或在樹下經行或六通自在教化聲聞緣覺或十地菩薩大人權現比丘在大眾中皆同一心受鉢和羅飯具清淨戒聖眾之道其德汪洋當此之日者正明七月十五上善聚會之勝時也一切聖眾德本汪洋但此日之前各自安居此日之後遊行無定惟茲嘉會海會雲集倍覺殊勝也山間樹下略舉其所依足顯頭陀勝處禪定經行略明其修相足顯精進勝功得四道果者斷分別煩惱證須陀洹名見道斷欲界俱生煩惱六品證斯陀含更斷下三品盡證阿那含名修道斷色無色界七十二品俱生煩惱皆盡證阿羅漢名無學道自利成就也六通自在教化聲聞緣覺者統理大眾教其弟子修行四諦十二因緣觀依聲聞乘緣覺乘而得出離利他成就也十地菩薩大人者歡喜地乃至法雲地分證法身破無明得中道應本同流九界廣度眾生雖六道四生無不示現以比丘是住持僧寶關係佛法每權現之如地藏菩薩以聲聞像入大集會世尊廣歎功德勝利超過一切諸大菩薩不可稱計既讚歎已說十輪經遺誡末世不得於出家人輕賤毀辱以剃髮染衣即是聖賢幢相雖破戒乃至無戒捨身決墮地獄猶為人天福田況復具戒況復證果故菩薩大人為護正法往往示作比丘混入庸侶逆順縱橫隨機設化俾增上慢人及無信之輩了知聖凡難測不敢以牛羊眼觀視出家弟子而取重愆以此方便令僧寶種性不斷佛法賴以久存也在大眾中者通指山間樹下之賢禪定經行之侶自利利他之士若權若實之儔總集於自恣大會之中也皆同一心受鉢和羅飯者憐愍施主無著無貪美食惡食不生增減故名一心梵語鉢和羅自誓經言鉢和蘭祗是梵音輕重此翻自恣食謂七月十五日設食供佛及僧名鉢和羅飯即前文所列勝供也具清淨戒等者結讚勝田之相聖眾雖權實不等總以戒為其體佛滅度後以戒為師依戒而住禪定經行四果六通固自因戒生定因定發慧內秘菩薩外現聲聞尤必執持禁戒嚴護威儀倘戒不清淨名曰無慚受此信心勝供不啻銅汁鐵丸若戒根清淨雖未證果亦稱聖眾以登壇時所得如法清淨律儀即是無漏戒身直至成道無別體故如此聖德如雲普集誰能測其涯涘哉五護勝益其有供養此等自恣僧者現世父母六親眷屬得出三塗之苦應時解脫衣食自然若父母現在者福樂百年若七世父母生天自在化生入天華光勝益者與拔兩益出三塗得解脫拔苦益也衣食自然福樂百年入天華光與樂益也現世謂現生對下文七世而言六親謂父母兄弟姊妹又父黨六親謂伯叔兄弟子孫母黨六親謂姑姨姊妹女孫眷屬謂夫妻婢妾及一切表裏姻戚等衣食自然略舉人天樂事若充其致則有慚愧衣如來衣禪悅法喜食第一義食皆悉自然自在化生者諸天不由胞胎故若充其致則三種意生身皆悉自在入天華光者妙華光明諸天快樂之相若充其致則萬行為華般若為光第一義為天三德秘藏以為安宅是名入天華光據此一文不惟度於父母并及六親眷屬不惟拔濟餓鬼悉使永離三塗不惟薦度亡人亦能利益現在功德宏深不可思議故曰令一切難皆離憂苦二教眾僧受供之儀時佛勅十方眾僧皆先為施主家呪願願七世父母行禪定意然後受食初受食時先安在佛前塔寺中佛前眾僧呪願竟便自受食施主設供本為父母故將受食先須呪願并行禪定呪願者願其父母離苦得樂今文略也行禪定意者攝心觀想凝慮澄神令呪願成就也佛前者隨是何等佛像塔寺中佛前者浮圖及殿堂中佛像供佛然後及僧加以呪願禪定三寶具足令施福圓滿也三當機獲益脫苦又二初孝子獲法喜益脫憂愁苦時目連比丘及大菩薩眾皆大歡喜目連悲啼泣聲釋然除滅法喜之益大眾同欣以各懷報恩之心故憂愁之苦目連頓釋以慈母必能度脫故二慈母獲濟度益脫果報苦時目連母即於是日得脫一劫餓鬼之苦積罪重殃壽同造化法音方演果報消亡亦如韋提創聞十六觀門頓悟無生法忍慈母既脫苦輪孝子仍修勝供增上與樂於理何妨舊云應至七月十五供自恣僧母方脫苦恐為未達只據今文益顯法門之勝三流通分三初申請二讚答三奉行今初目連復白佛言弟子所生母得蒙三寶功德之力眾僧威神之力故若未來世一切佛弟子亦應奉盂蘭盆救度現在父母乃至七世父母可為爾不君子愛其親以及人之親況出世大孝乎前以母嬰重苦痛切肝腸馳告如來且求悲救今母蒙解脫為眾重咨既云得蒙三寶之力又云眾僧威神之力者雖稱三寶已攝僧伽為顯僧寶所存佛法收寄故別表之也二讚答又二初讚許二正答今初佛言大善快問我正欲說汝今復問下契群機故大善上契聖心故稱快正欲說而復問正所謂快問也二正答又四一教起行善男子若比丘比丘尼國王太子大臣宰相三公百官萬民庶人行慈孝者皆應先為所生現在父母過去七世父母於七月十五日佛歡喜日僧自恣日以百味飯食安盂蘭盆中施十方自恣僧無論出家在家富貴貧賤各有生身重恩安得不修孝慈之行不修孝慈不但非佛弟子亦復非人類也皆應先為者不必父母去世然後為之佛歡喜日者如來應世本為度生今自恣日眾僧如法相教相諫展轉相成能令正法久住又檀越得因此修供作福廣行孝慈暢佛本懷故名佛歡喜日也二教發願願使現在父母壽命百年無病無一切苦惱之患乃至七世父母離餓鬼苦生人天中福樂無極一切行門願為前導既修勝供須以勝願期之自得存亡均利充七世以及塵劫是在修願行者自拓其心量也三教常作是佛弟子修孝順者應念念中常憶父母乃至七世父母年年七月十五日常以孝慈憶所生父母為作盂蘭盆施佛及僧以報父母長養慈愛之恩念念常憶父母等正是教修孝慈孝慈之道正是觀心若不以心觀為法供者徒存空想縱令晝夜悲號究竟何益若漠然忘念則非佛弟子忤逆不孝進退推之必須約觀心釋此文義也觀心之義具如元文年年七月十五等教修事供不得執理而廢事又不得一年修供之後遂謂父母已度不復更修須知父母恩重無極須是念念觀理年年舉事未度脫者令得度脫已度脫者令增勝樂方名孝子始是報恩四勸受持若一切佛弟子應當奉持是法信受名奉專念名持即是雙勸修於事理二供也應當者誡勗之辭若不奉持非佛弟子以應反顯不應不應即是律中罪名舊所謂制令必行不行即是違制亦可屬律藏者是也即經是律益顯其為大乘矣三奉行時目連比丘四輩弟子歡喜奉行四輩即四眾一發起眾二當機眾三影響眾四結緣眾歡喜者三義故喜一能說人清淨二所說法清淨三所得利益清淨今文利益雖不明於果證而圓音一唱密益何窮如初為提謂說三歸五戒便有無量諸天發大道心無量諸天得無生忍況今殊勝法門方彈訶於六通聖果豈僅僅為人天淺津經文自略義必有秘密不定二種深益也
